name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v1.2.3)'
        required: true

permissions:
  contents: write   # gh release upload
  id-token: write   # PyPI OIDC trusted publisher

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build wheel and sdist
        run: |
          pip install build
          python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pypi:
    name: Publish to PyPI
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/gh-switcher
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1

  deb:
    name: Build Debian package
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install fpm
        run: |
          sudo apt-get install -y ruby ruby-dev
          sudo gem install fpm

      - name: Build .deb
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          python3 -m venv --system-site-packages /tmp/gh-switcher-root/opt/gh-switcher
          /tmp/gh-switcher-root/opt/gh-switcher/bin/pip install dist/*.whl
          fpm -s dir -t deb \
            --name gh-switcher \
            --version "$VERSION" \
            --depends python3-xapp \
            --depends python3-gi \
            --depends python3-yaml \
            --depends python3-pil \
            --depends python3-platformdirs \
            --after-install packaging/deb/postinst.sh \
            /tmp/gh-switcher-root/=/

      - name: Attach .deb to release
        run: gh release upload "${{ github.event.release.tag_name || inputs.tag }}" ./*.deb --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
