name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check src/ tests/

      - name: Format check
        run: ruff format --check src/ tests/

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dev dependencies
        run: pip install -q -e ".[dev]"

      - name: Python tests
        run: python -m pytest tests/ --ignore=tests/bash -v

      - name: Shell tests (bats)
        run: libs/bats/bin/bats tests/bash/install.bats

  release:
    name: Release
    needs: [python, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Record current latest tag
        id: before_release
        run: |
          git fetch --tags --quiet
          echo "tag=$(git describe --tags --abbrev=0 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"

      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger publish if new release was created
        run: |
          git fetch --tags --quiet
          NEW_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [[ -n "${NEW_TAG}" && "${NEW_TAG}" != "${{ steps.before_release.outputs.tag }}" ]]; then
            echo "New release detected: ${NEW_TAG} — triggering publish workflow"
            gh workflow run publish.yml --ref "${NEW_TAG}"
          else
            echo "No new release — skipping publish"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
